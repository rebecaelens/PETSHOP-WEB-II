<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favoritos</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-app">
    <header class="site-header">
      <div class="header-top container">
        <a href="principal.html" class="branding" aria-label="Voltar para o menu principal">
          <img src="images/logomr.png" alt="MR Rações" class="logo-img" onerror="this.style.display='none'" />
          <div class="logo-badge">MR</div>
        </a>

        <div class="user-actions">
          <a class="icon-link favorites-link" href="favoritos.html" aria-label="Favoritos">
            <img src="images/favorite.png" alt="Favoritos">
            <span class="cart-badge" data-favorite-badge>0</span>
          </a>
          <a class="icon-link cart-link" href="carrinho.html" aria-label="Carrinho">
            <img src="images/carrinho.png" alt="Carrinho">
            <span class="cart-badge" data-cart-badge>0</span>
          </a>
        </div>
      </div>
    </header>

    <main class="content single">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="principal.html">Início</a>
        <span class="separator">/</span>
        <span class="current">Favoritos</span>
      </nav>

      <section class="grid products" data-favorites-list></section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
