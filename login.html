<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-login">
    <header class="login-topbar">
      <div class="login-brand">
        <img class="login-logo" src="images/logomr.png" alt="MR Racoes" />
      </div>
      <div class="login-secure">
        <span class="login-secure-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path
              d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2zm-7-2a2 2 0 0 1 4 0v2h-4V7zm7 12H7v-8h10v8z"
            />
          </svg>
        </span>
        <span>Acesso Seguro</span>
      </div>
    </header>

    <main class="login-main">
      <section class="login-panel">
        <div class="login-brand-hero">
          <div class="login-brand-main">
            <div>MR</div>
            <div>Rações</div>
          </div>
          <div class="login-brand-tagline">Tudo para o seu Pet</div>
        </div>

        <form class="login-form" action="principal.html" method="get">
          <input
            class="login-input"
            type="email"
            name="email"
            placeholder="Digite seu e-mail"
            required
          />
          <div class="password-field">
            <input
              class="login-input"
              type="password"
              name="senha"
              placeholder="Digite sua senha"
              required
            />
            <button
              class="password-toggle"
              type="button"
              data-password-toggle
              data-state="hidden"
              aria-label="Mostrar senha"
              aria-pressed="false"
            >
              <svg
                class="password-icon password-icon--open"
                viewBox="0 0 24 24"
                role="img"
                aria-hidden="true"
              >
                <path
                  d="M12 5c-5 0-9 4.2-10 7 1 2.8 5 7 10 7s9-4.2 10-7c-1-2.8-5-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6z"
                />
              </svg>
              <svg
                class="password-icon password-icon--closed"
                viewBox="0 0 24 24"
                role="img"
                aria-hidden="true"
              >
                <path
                  d="M3.3 4.7 2 6l3 3C3.2 10.3 2 11.8 1.5 13c1 2.7 5 7 10.5 7 1.8 0 3.4-.4 4.9-1.1l2.3 2.3 1.4-1.4L3.3 4.7zM12 18c-3.8 0-6.7-3-8-5 0-.1.1-.2.2-.3l2.1 2.1a4.9 4.9 0 0 0 6.9 6.9l1.6 1.6c-.9.4-1.8.7-2.8.7zm4.9-3.2-1.6-1.6a4.9 4.9 0 0 0-6.9-6.9L6.8 4.6c1.5-.7 3.1-1.1 5.2-1.1 4.4 0 8.1 3.3 9.5 6.5-.6 1.3-1.8 3-3.6 4.8z"
                />
              </svg>
            </button>
          </div>

          <div class="login-forgot">
            <a href="recuperar.html">Esqueci minha senha</a>
          </div>

          <button class="login-btn login-btn-muted" type="submit">Entrar</button>

          <div class="login-divider">
            <span>Acesso Rapido com</span>
          </div>

          <a class="login-btn login-btn-outline" href="nova-conta.html">Nova Conta</a>
        </form>
      </section>
    </main>
    <script src="js/password-toggle.js"></script>
  </body>
</html>
