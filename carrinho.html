<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body class="page-app">
    <header class="topbar">
      <a class="link" href="principal.html">Voltar</a>
      <div class="topbar-title">Carrinho</div>
      <div class="topbar-actions">
        <a class="link" href="favoritos.html">Favoritos</a>
        <a class="link" href="login.html">Sair</a>
      </div>
    </header>

    <main class="content single">
      <section class="list">
        <div class="list-header">
          <h1>Itens no carrinho</h1>
          <button class="btn ghost" type="button">Limpar carrinho</button>
        </div>

        <div class="list-item">
          <div>
            <div class="item-title">Produto A</div>
            <div class="item-sub">Quantidade: 1</div>
          </div>
          <button class="btn ghost" type="button">Remover</button>
        </div>

        <div class="list-item">
          <div>
            <div class="item-title">Produto B</div>
            <div class="item-sub">Quantidade: 2</div>
          </div>
          <button class="btn ghost" type="button">Remover</button>
        </div>

        <div class="list-total">
          <span>Total</span>
          <strong>R$ 250,00</strong>
        </div>

        <button class="btn primary" type="button">Finalizar compra</button>
      </section>
    </main>
  </body>
</html>
