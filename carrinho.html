<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-app cart-page">
    <header class="site-header">
      <div class="header-top container">
        <div class="branding">
          <img src="images/logomr.png" alt="MR Rações" class="logo-img" onerror="this.style.display='none'" />
          <div class="logo-badge">MR</div>
        </div>
        <div class="cart-header-title">
          <img src="images/acesssec.png" alt="Acesso Seguro" class="secure-icon" />
          <span class="secure-text">Acesso Seguro</span>
        </div>
      </div>
    </header>

    <main class="content single">
      <section class="cart-container">
        <div id="cart-products"></div>
        
        <div class="cart-bottom">
          <div class="delivery-section">
            <h3>Frete e Horário de Entrega</h3>
            <form id="delivery-form">
              <div class="form-group">
                <label>Bairro:</label>
                <input type="text" id="bairro" placeholder="Digite seu bairro" required />
              </div>
              <div class="form-group">
                <label>Rua:</label>
                <input type="text" id="rua" placeholder="Digite sua rua" required />
              </div>
              <div class="form-group">
                <label>Número:</label>
                <input type="text" id="numero" placeholder="Digite o número" required />
              </div>
            </form>
            <div class="delivery-total">
              <span class="delivery-total-label">
                <img src="images/totalentr.png" alt="Total" class="delivery-total-icon" />
                Total
              </span>
              <strong id="delivery-total-price">R$ 2,00</strong>
            </div>
          </div>

          <div class="summary-section">
            <h3>Resumo do pedido</h3>
            <div class="summary-item">
              <span id="products-count">Produtos (0)</span>
              <span id="products-price">R$ 0,00</span>
            </div>
            <div class="summary-item">
              <span>Frete</span>
              <span id="delivery-price">R$ 2,00</span>
            </div>
            <div class="summary-total">
              <span class="summary-total-label">
                <img src="images/totalentr.png" alt="Total com a Entrega" class="summary-total-icon" />
                Total com a Entrega
              </span>
              <strong id="total-price">R$ 2,00</strong>
            </div>
            <button class="btn primary checkout-btn" id="checkout-btn">Fazer Pedido</button>
            <a href="principal.html" class="buy-more-link">Comprar mais produtos</a>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal de confirmação de remoção -->
    <div class="modal-overlay" id="removeModalOverlay">
      <div class="modal-confirm">
        <div class="modal-content">
          <h3 class="modal-title">Remover item do carrinho?</h3>
          <p class="modal-message" id="removeModalMessage">Tem certeza que deseja remover este item?</p>
          <div class="modal-actions">
            <button class="btn secondary" id="removeModalCancel">Cancelar</button>
            <button class="btn primary" id="removeModalOk">Remover</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const productDatabase = {
        p1: { name: 'Golden Premiun', price: 240, image: 'images/item2.png', desc: 'Uma ração seca completa e balanceada, desenvolvida para fornecer nutrição de qualidade para cães e gatos.' },
        p2: { name: 'Ração SuperMix', price: 100, image: 'images/item3.png', desc: 'Ração seca completa e balanceada, formulada para oferecer nutrição adequada para cães e gatos.' },
        p3: { name: 'Brinquedos para gatos', price: 240, image: 'images/item4.png', desc: 'Brinquedos desenvolvidos para estimular o instinto natural de caça e manter o pet ativo.' },
        p4: { name: 'Fucinheira para Cachorros', price: 240, image: 'images/item5.jpg', desc: 'Acessório essencial para manter seu pet seguro e confortável durante a caminhada.' },
        p5: { name: 'Coleira Básica', price: 240, image: 'images/item1.png', desc: 'Acessório essencial para a identificação e segurança do pet no dia a dia.' }
      };

      const deliveryFee = 2;

      const renderCart = () => {
        const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        const container = document.getElementById('cart-products');
        
        if (cartItems.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Seu carrinho está vazio</p>';
          updateSummary(cartItems);
          document.getElementById('checkout-btn').disabled = true;
          return;
        }

        container.innerHTML = cartItems.map((item, index) => {
          const product = productDatabase[item.id];
          let quantityDisplay = '';
          let totalPrice = 0;

          if (item.isWeightBased) {
            // Item de peso (ração)
            if (item.purchaseMode === 'by-weight') {
              quantityDisplay = `<span>${item.weight.toFixed(2)} kg</span>`;
            } else {
              quantityDisplay = `<span>R$ ${item.price.toFixed(2)}</span>`;
            }
            totalPrice = item.price;
          } else {
            // Item normal
            quantityDisplay = item.quantity;
            totalPrice = (product?.price || 0) * item.quantity;
          }

          return `
            <div class="cart-product">
              <img src="${product?.image}" alt="${product?.name}" class="cart-product-img" />
              <div class="cart-product-info">
                <h3>${product?.name}</h3>
                <p>${product?.desc}</p>
                <div class="cart-product-controls">
                  ${item.isWeightBased ? 
                  
                    `<div></div>
                     <button class="qty-btn btn-remove" onclick="removeFromCart(${index})" title="Remover do carrinho"><img src="images/lixeira.png" alt="Remover" class="icon-trash"></button>` :
                    `<button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                     <input type="number" value="${item.quantity}" readonly class="qty-input" />
                     <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>`
                  }
                </div>
              </div>
              <div class="cart-product-price">
                <span>R$ ${totalPrice.toFixed(2)}</span>
              </div>
            </div>
          `;
        }).join('');

        updateSummary(cartItems);
        document.getElementById('checkout-btn').disabled = false;
      };

      const updateQty = (index, delta) => {
        const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        if (cartItems[index]) {
          cartItems[index].quantity = Math.max(1, cartItems[index].quantity + delta);
          localStorage.setItem('cartItems', JSON.stringify(cartItems));
          renderCart();
        }
      };

      let removeIndexToConfirm = null;

      function showRemoveModal(index, itemName) {
        removeIndexToConfirm = index;
        const overlay = document.getElementById('removeModalOverlay');
        const msg = document.getElementById('removeModalMessage');
        msg.textContent = `Remover ${itemName} do carrinho?`;
        overlay.classList.add('active');
      }

      function hideRemoveModal() {
        removeIndexToConfirm = null;
        document.getElementById('removeModalOverlay').classList.remove('active');
      }

      const removeModalCancel = document.getElementById('removeModalCancel');
      const removeModalOk = document.getElementById('removeModalOk');

      removeModalCancel.addEventListener('click', hideRemoveModal);
      document.getElementById('removeModalOverlay').addEventListener('click', function(e) {
        if (e.target === this) hideRemoveModal();
      });
      removeModalOk.addEventListener('click', function() {
        if (removeIndexToConfirm !== null) {
          const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
          cartItems.splice(removeIndexToConfirm, 1);
          localStorage.setItem('cartItems', JSON.stringify(cartItems));
          renderCart();
          updateCartBadge && updateCartBadge();
          hideRemoveModal();
        }
      });

      // Substitui chamada de removeFromCart por showRemoveModal
      function removeFromCart(index) {
        const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        const itemName = cartItems[index].name;
        showRemoveModal(index, itemName);
      };

      const updateSummary = (cartItems) => {
        let total = 0;
        let count = 0;
        
        cartItems.forEach(item => {
          if (item.isWeightBased) {
            // Item de peso - o preço já está calculado
            total += item.price;
            count += 1; // Conta como 1 item
          } else {
            // Item normal
            const product = productDatabase[item.id];
            total += (product?.price || 0) * item.quantity;
            count += item.quantity;
          }
        });

        document.getElementById('products-count').textContent = `Produtos (${count})`;
        document.getElementById('products-price').textContent = `R$ ${total.toFixed(2)}`;
        document.getElementById('total-price').textContent = `R$ ${(total + deliveryFee).toFixed(2)}`;
        document.getElementById('delivery-total-price').textContent = `R$ ${deliveryFee.toFixed(2)}`;
      };

      const updateCartBadge = () => {
        const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        const itemCount = cartItems.reduce((total, item) => {
          return total + (item.isWeightBased ? 1 : item.quantity);
        }, 0);
        const badges = document.querySelectorAll('[data-cart-badge]');
        badges.forEach(badge => {
          if (itemCount > 0) {
            badge.textContent = itemCount;
            badge.classList.remove('hidden');
          } else {
            badge.classList.add('hidden');
          }
        });
      };

      document.getElementById('checkout-btn').addEventListener('click', () => {
        const bairro = document.getElementById('bairro').value;
        const rua = document.getElementById('rua').value;
        const numero = document.getElementById('numero').value;

        if (!bairro || !rua || !numero) {
          alert('Por favor, preencha todos os dados de entrega!');
          return;
        }

        alert('Pedido finalizado com sucesso!');
        localStorage.removeItem('cartItems');
        renderCart();
        updateCartBadge();
        document.getElementById('delivery-form').reset();
      });

      renderCart();
    </script>
  </body>
</html>
