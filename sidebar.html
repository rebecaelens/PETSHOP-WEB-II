<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar</title>
  <style>
    /* Sidebar Styles */
    .sidebar {
      background: #fff7f3;
      padding: 16px 12px;
      border-right: 1px solid #fde2d7;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      z-index: 120;
      position: fixed;
      left: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      transform: translateX(-110%);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      color: #5a2a24;
    }

    .sidebar .menu-item .menu-icon {
      font-size: 18px;
    }

    .sidebar .menu-item .menu-text {
      font-weight: 700;
    }

    .sidebar .menu-item.active,
    .sidebar .menu-item:hover {
      background: #ffd9cc;
    }

    .sidebar.open {
      transform: translateX(0);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    .sidebar {
      will-change: transform;
    }

    .close-sidebar {
      border: none;
      background: transparent;
      font-size: 20px;
      padding: 4px 8px;
      cursor: pointer;
      color: #5a2a24;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        inset: 72px 0 0 0;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        z-index: 20;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar" data-sidebar>
    <div class="sidebar-header">
      <div class="sidebar-title">Navegação</div>
      <button class="close-sidebar" type="button" aria-label="Fechar" data-sidebar-toggle>✕</button>
    </div>
    <nav class="menu" role="navigation">
      <a class="menu-item" href="principal.html">
        <span class="menu-icon">🏠</span>
        <span class="menu-text">Página Inicial</span>
      </a>
      <a class="menu-item" href="principal.html?q=" >
        <span class="menu-icon">🔎</span>
        <span class="menu-text">Pesquisar</span>
      </a>
      <a class="menu-item" href="consultar.html">
        <span class="menu-icon">📋</span>
        <span class="menu-text">Consultar</span>
      </a>
      <a class="menu-item" href="precos.html">
        <span class="menu-icon">🏷️</span>
        <span class="menu-text">Preços</span>
      </a>
      <a class="menu-item" href="perfil.html">
        <span class="menu-icon">👤</span>
        <span class="menu-text">Perfil</span>
      </a>
      <a class="menu-item" href="#" data-logout>
        <span class="menu-icon">🚪</span>
        <span class="menu-text">Sair</span>
      </a>
    </nav>
  </aside>

  <script>
    async function loadSidebar() {
      const layout = document.querySelector('.layout');
      if (!layout) {
        console.error('Layout container not found');
        return;
      }

      try {
        const response = await fetch('sidebar.html');
        const html = await response.text();
        
        // Extract only the sidebar element from the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const sidebarElement = doc.querySelector('[data-sidebar]');
        
        if (sidebarElement) {
          layout.insertAdjacentElement('beforebegin', sidebarElement);
          initSidebarControls();
        }
      } catch (error) {
        console.error('Error loading sidebar:', error);
      }
    }

    function initSidebarControls() {
      const sidebar = document.querySelector('[data-sidebar]');
      const sidebarToggles = Array.from(document.querySelectorAll('[data-sidebar-toggle]'));
      const overlay = document.querySelector('[data-overlay]');

      if (!sidebar) return;

      function openSidebar() {
        sidebar.classList.add('open');
        if (overlay) overlay.classList.add('active');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        if (overlay) overlay.classList.remove('active');
      }

      sidebarToggles.forEach(btn => {
        btn.addEventListener('click', () => {
          if (sidebar.classList.contains('open')) {
            closeSidebar();
          } else {
            openSidebar();
          }
        });
      });

      if (overlay) {
        overlay.addEventListener('click', closeSidebar);
      }
    }

    // Auto-load if not already in principal.html
    if (document.querySelector('[data-sidebar]')) {
      initSidebarControls();
    }
  </script>
</body>
</html>
